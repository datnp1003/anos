name: Release Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload assets to, e.g. v0.1.1-dev.1'
        required: true
        type: string

permissions:
  contents: write

jobs:
  linux:
    name: Build ${{ matrix.artifact_arch }} artifacts
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04-arm
            artifact_arch: arm64
            target: aarch64-unknown-linux-musl
          - runner: ubuntu-latest
            artifact_arch: x86_64
            target: x86_64-unknown-linux-musl

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.artifact_arch }}
          workspaces: |
            anosd
            anos-cli

      - name: Install musl-dev (static libc)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq musl-tools

      - name: Build anosd (static musl)
        working-directory: anosd
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build anos-cli (static musl)
        working-directory: anos-cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          cp anosd/target/${{ matrix.target }}/release/anosd "dist/anosd-linux-${{ matrix.artifact_arch }}"
          cp anos-cli/target/${{ matrix.target }}/release/anos-cli "dist/anos-cli-linux-${{ matrix.artifact_arch }}"
          cp install.sh dist/install.sh
          chmod +x "dist/anosd-linux-${{ matrix.artifact_arch }}" "dist/anos-cli-linux-${{ matrix.artifact_arch }}" dist/install.sh
          sha256sum dist/* > "dist/SHA256SUMS-linux-${{ matrix.artifact_arch }}"
          ls -lh dist

      - name: Upload artifacts to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          gh release upload "$TAG_NAME" \
            "dist/anosd-linux-${{ matrix.artifact_arch }}" \
            "dist/anos-cli-linux-${{ matrix.artifact_arch }}" \
            dist/install.sh \
            "dist/SHA256SUMS-linux-${{ matrix.artifact_arch }}" \
            --clobber
