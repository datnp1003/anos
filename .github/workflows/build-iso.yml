name: Build AnosOS ISO

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, e.g. v0.10.3'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-iso:
    name: Build AnosOS ISO
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: anosd, anos-cli

      - name: Build anosd
        run: cd anosd && cargo build --release

      - name: Build anos-cli
        run: cd anos-cli && cargo build --release

      - name: Install ISO tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            genisoimage mtools squashfs-tools cpio \
            linux-image-generic busybox-static udhcpc

      - name: Build rootfs + ISO
        run: |
          set -euo pipefail
          WORK="/tmp/anos-os-build"
          rm -rf "$WORK"
          mkdir -p "$WORK"/{bin,boot,sbin,etc,dev,proc,sys,tmp,usr/bin,opt/anos/{config,skills}}

          cp anosd/target/release/anosd "$WORK/usr/bin/"
          cp anos-cli/target/release/anos-cli "$WORK/usr/bin/"
          cp ANOS-SYSTEM-PROMPT.md "$WORK/opt/anos/"
          cp -r skills "$WORK/opt/anos/skills/" 2>/dev/null || true
          cp anos-init "$WORK/sbin/init"
          chmod +x "$WORK/sbin/init" "$WORK/usr/bin/anosd" "$WORK/usr/bin/anos-cli"

          # Busybox (static binary)
          cp /bin/busybox "$WORK/bin/" 2>/dev/null || true
          for u in sh ls cat echo mount umount ip ping modprobe mknod sleep grep mkdir ln rm mv cp; do
              ln -sf /bin/busybox "$WORK/bin/$u" 2>/dev/null || true
          done
          cp /usr/sbin/udhcpc "$WORK/sbin/" 2>/dev/null || true

          # Kernel
          KERNEL=$(ls /boot/vmlinuz-* 2>/dev/null | head -1)
          cp "$KERNEL" "$WORK/boot/vmlinuz"

          # Initrd
          echo "📦 Building initrd..."
          (cd "$WORK" && find . -path ./boot -prune -o -print | cpio -o -H newc 2>/dev/null) | gzip > "$WORK/boot/initrd.img"
          echo "   Initrd: $(du -h $WORK/boot/initrd.img | cut -f1)"

          # GRUB
          mkdir -p "$WORK/boot/grub"
          cat > "$WORK/boot/grub/grub.cfg" << 'ENDGRUB'
      set timeout=5
      menuentry "🦾 AnosOS" {
          linux /boot/vmlinuz console=tty1 quiet
          initrd /boot/initrd.img
      }
      ENDGRUB

          # ISO
          ISO="anos-os-linux-amd64.iso"
          echo "💿 Building $ISO..."
          genisoimage -R -r -J -V "ANOS_OS" -o "$ISO" -b boot/grub/grub.cfg -no-emul-boot "$WORK"
          ls -lh "$ISO"
          echo "iso_path=$ISO" >> "$GITHUB_ENV"
          echo "iso_name=$ISO" >> "$GITHUB_ENV"

      - name: Upload ISO to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          gh release view "$TAG" &>/dev/null || gh release create "$TAG" --title "$TAG" --notes "AnosOS ISO auto-built by CI"
          gh release upload "$TAG" "${{ env.iso_path }}" --clobber

      - name: Summary
        run: |
          echo "## 🦾 AnosOS ISO Built" >> "$GITHUB_STEP_SUMMARY"
          echo "| ISO | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ${{ env.iso_name }} | $(du -h ${{ env.iso_path }} | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
