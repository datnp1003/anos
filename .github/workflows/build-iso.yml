name: Build AnosOS ISO (x86_64)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, e.g. v0.11.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-iso:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: anosd, anos-cli

      - name: Build anosd + anos-cli
        run: |
          cd anosd && cargo build --release
          cd ../anos-cli && cargo build --release

      - name: Install ISO tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            genisoimage squashfs-tools cpio python3 \
            linux-image-generic busybox-static udhcpc

      - name: Build rootfs + ISO (multi-user)
        run: |
          set -euo pipefail
          WORK="/tmp/anos-os-build"
          rm -rf "$WORK"
          mkdir -p "$WORK"/{bin,sbin,boot,dev,etc/init.d,home/anos,opt/anos/{config,skills},proc,run,sys,tmp,usr/bin,var/log}

          # --- Anos binaries + assets ---
          cp anosd/target/release/anosd "$WORK/usr/bin/"
          cp anos-cli/target/release/anos-cli "$WORK/usr/bin/"
          cp ANOS-SYSTEM-PROMPT.md "$WORK/opt/anos/"
          cp -r skills "$WORK/opt/anos/skills/" 2>/dev/null || true
          cp anos-init "$WORK/sbin/init"
          chmod +x "$WORK/sbin/init" "$WORK/usr/bin/anosd" "$WORK/usr/bin/anos-cli"

          # --- Busybox + symlinks ---
          cp /bin/busybox "$WORK/bin/busybox"
          chmod +x "$WORK/bin/busybox"
          # Install all busybox applets
          "$WORK/bin/busybox" --install -s "$WORK/bin/" 2>/dev/null || true
          # Critical symlinks (also in /sbin for getty/login)
          for u in sh ls cat echo mount umount ip ping modprobe mknod sleep grep mkdir ln rm mv cp \
                   getty login passwd su adduser addgroup id whoami tty clear head tail \
                   chmod chown kill ps df du tar gzip dd sync reboot poweroff; do
              [ -e "$WORK/bin/$u" ] || ln -sf /bin/busybox "$WORK/bin/$u" 2>/dev/null || true
          done
          mkdir -p "$WORK/sbin"
          ln -sf /bin/busybox "$WORK/sbin/getty" 2>/dev/null || true
          ln -sf /bin/busybox "$WORK/sbin/login" 2>/dev/null || true
          ln -sf /bin/busybox "$WORK/sbin/init" 2>/dev/null || true
          ln -sf /bin/busybox "$WORK/sbin/reboot" 2>/dev/null || true
          ln -sf /bin/busybox "$WORK/sbin/poweroff" 2>/dev/null || true
          cp /usr/sbin/udhcpc "$WORK/sbin/" 2>/dev/null || cp /sbin/udhcpc "$WORK/sbin/" 2>/dev/null || true

          # --- /etc/passwd + /etc/shadow + /etc/group ---
          ANOS_HASH=$(python3 -c "import crypt; print(crypt.crypt('anos', crypt.mksalt(crypt.METHOD_SHA512)))")
          ROOT_HASH=$(python3 -c "import crypt; print(crypt.crypt('root', crypt.mksalt(crypt.METHOD_SHA512)))")
          echo "  anos hash: ${ANOS_HASH:0:20}..."
          echo "  root hash: ${ROOT_HASH:0:20}..."

          cat > "$WORK/etc/passwd" << PASSWD
root:x:0:0:root:/root:/bin/sh
daemon:x:1:1:daemon:/usr/sbin:/bin/false
bin:x:2:2:bin:/bin:/bin/false
sys:x:3:3:sys:/dev:/bin/false
sync:x:4:65534:sync:/bin:/bin/sync
anos:x:1000:1000:Anos AI User:/home/anos:/bin/sh
nobody:x:65534:65534:nobody:/nonexistent:/bin/false
PASSWD

          cat > "$WORK/etc/shadow" << SHADOW
root:${ROOT_HASH}:20000:0:99999:7:::
daemon:*:20000:0:99999:7:::
bin:*:20000:0:99999:7:::
sys:*:20000:0:99999:7:::
sync:*:20000:0:99999:7:::
anos:${ANOS_HASH}:20000:0:99999:7:::
nobody:*:20000:0:99999:7:::
SHADOW

          cat > "$WORK/etc/group" << GROUP
root:x:0:
daemon:x:1:
bin:x:2:
sys:x:3:
admin:x:100:anos
anos:x:1000:
nogroup:x:65534:
GROUP

          chmod 644 "$WORK/etc/passwd" "$WORK/etc/group"
          chmod 600 "$WORK/etc/shadow"

          # --- /etc/profile (auto anos-cli on tty1) ---
          cat > "$WORK/etc/profile" << 'PROFILE'
#!/bin/sh
export PATH=/usr/bin:/bin:/sbin:/usr/sbin
export ANOS_DIR=/opt/anos
export ANOS_SOCKET=/tmp/anos.sock
ANOS_READY=false
[ -S /tmp/anos.sock ] && ANOS_READY=true
if [ "$(tty)" = "/dev/tty1" ] && [ "$(whoami)" = "anos" ]; then
    clear 2>/dev/null || true
    echo "🦾 AnosOS — Launching AI CLI..."
    echo ""
    if $ANOS_READY; then
        exec /usr/bin/anos-cli
    else
        echo "⚠️  Daemon not ready — starting shell"
        exec /bin/sh
    fi
fi
echo "🦾 AnosOS v0.11.0"
$ANOS_READY && echo " AI: ✅ Online" || echo " AI: ❌ Offline"
echo " Type 'anos-cli' for AI shell"
echo ""
PROFILE

          # --- /etc/issue (pre-login banner) ---
          cat > "$WORK/etc/issue" << 'ISSUE'

          🦾 AnosOS v0.11.0 — AI Native OS

          Default: anos / anos
          ⚠️  CHANGE PASSWORD on first login!

ISSUE

          # --- Kernel ---
          KERNEL=$(ls /boot/vmlinuz-* 2>/dev/null | head -1)
          cp "$KERNEL" "$WORK/boot/vmlinuz"
          echo "Kernel: $(basename "$KERNEL")"

          # --- Initrd ---
          echo "📦 Building initrd..."
          (cd "$WORK" && find . -path ./boot -prune -o -print | cpio -o -H newc 2>/dev/null) | gzip > "$WORK/boot/initrd.img"

          # --- GRUB ---
          mkdir -p "$WORK/boot/grub"
          cat > "$WORK/boot/grub/grub.cfg" << 'GRUB'
set timeout=5
set default=0
loadfont unicode

menuentry "🦾 AnosOS — AI Native OS" {
    linux /boot/vmlinuz console=tty1 quiet
    initrd /boot/initrd.img
}
menuentry "AnosOS — Verbose boot" {
    linux /boot/vmlinuz console=tty1
    initrd /boot/initrd.img
}
menuentry "AnosOS — Safe mode (root shell)" {
    linux /boot/vmlinuz console=tty1 init=/bin/sh
    initrd /boot/initrd.img
}
GRUB

          # --- ISO ---
          ISO="anos-os-linux-amd64.iso"
          echo "💿 Building $ISO..."
          genisoimage -R -r -J -V "ANOS_OS" -o "$ISO" -b boot/grub/grub.cfg -no-emul-boot "$WORK"
          SIZE=$(du -h "$ISO" | cut -f1)
          echo "✅ $ISO ($SIZE)"
          echo "iso_path=$ISO" >> "$GITHUB_ENV"

      - name: Upload ISO to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          gh release view "$TAG" &>/dev/null || gh release create "$TAG" --title "$TAG" --notes "AnosOS ISO (multi-user) auto-built by CI"
          gh release upload "$TAG" "${{ env.iso_path }}" --clobber

      - name: Summary
        run: |
          SIZE=$(du -h "${{ env.iso_path }}" | cut -f1)
          echo "## 🦾 AnosOS x86_64 ISO — Multi-User Ready" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ISO | ${{ env.iso_path }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Size | $SIZE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| User | anos / anos |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Root | root / root |" >> "$GITHUB_STEP_SUMMARY"
          echo "| tty1 | anos → auto anos-cli |" >> "$GITHUB_STEP_SUMMARY"
          echo "| tty2 | root shell |" >> "$GITHUB_STEP_SUMMARY"
          echo "| tty3 | admin shell |" >> "$GITHUB_STEP_SUMMARY"
